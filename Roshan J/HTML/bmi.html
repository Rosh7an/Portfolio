<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../CSS/bmi.css">
    
</head>
    <body>
    <div class="main" width="50px" height="50px">
        <div class="rectangle" >
        <table width="300px" height="200px">
            <form>
                <tr> 
                        <td>Weight (kg)</td>  
                        <td>
                            <br>
                        <input type="number" name="t1" id="t1" /><br><br>
                    </td>
                    </tr>
                    <tr>
                        <td>Height (m)</td>
                        <td><br>
                           <input type="number" name="t2" id="t2" /><br><br>
            
                        </td>
                    </tr>
                    <tr>
                        <td></td>
                        <td>
                           <input style="background-color:white ;"type="button" onclick="Calculate()" id="b1" value="Calculate"/> <br><br>
                           
                        </td>
                     </tr>
                    <tr>
                        <td>Result</td>
                        <td>
                            <input type="number" name="t3" id="t3" /><br><br> 
                        </td>
                    </tr>
                    
                    
                        </form>
        </table>
    </div>
</div>
    <script>
        
        var Calculate=function()
       {
        alert("Calculating the BMI");
        var a=document.getElementById("t1").value;
        var b=document.getElementById("t2").value;
        var c=a/(b*b);
        document.getElementById("t3").value=c;
       }
        
    
    </script>
    
</body>
</html>
